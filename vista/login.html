<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Ferretero - Inicio de Sesión</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>Don Ferretero</h1>
            <p>Sistema de Punto de Venta</p>
        </div>
        
        <!-- 
            NOTA: La validación de credenciales se implementará posteriormente 
            en el controlador de Python. Por ahora, el formulario redirige 
            directamente al panel principal para fines de demostración.
        -->
        <form action="panel_general.html" method="post">
            <div class="form-group">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" name="usuario" required placeholder="Ingrese su usuario">
            </div>
            
            <div class="form-group">
                <label for="contraseña">Contraseña</label>
                <input type="password" id="contraseña" name="contraseña" required placeholder="Ingrese su contraseña">
            </div>
            
            <div class="form-group">
                <label for="rol">Rol</label>
                <select id="rol" name="rol" required>
                    <option value="">Seleccione un rol</option>
                    <option value="administrador">Administrador</option>
                    <option value="cajero">Cajero</option>
                </select>
            </div>
            
            <button type="submit" class="btn-login">Acceder</button>
        </form>
        
        <div class="footer-note">
            <p>© 2024 Don Ferretero - Todos los derechos reservados</p>
        </div>
    </div>
</body>
</html>
